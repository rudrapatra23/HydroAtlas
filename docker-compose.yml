# ─── HydroAtlas — Docker Compose ─────────────────────────────────────
# Run the full stack: docker compose up --build
# Uses Neon PostgreSQL via backend/.env
# ─────────────────────────────────────────────────────────────────────

services:
  # ── One-off database migration runner ──────────────────────────────
  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: "no"
    env_file:
      - ./backend/.env
    command: ["python", "-m", "alembic", "upgrade", "head"]
    environment:
      APP_NAME: HydroAtlas
      VERSION: 0.1.0
      ENVIRONMENT: production
      LOG_LEVEL: INFO

  # ── FastAPI Backend ─────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    command:
      [
        "uvicorn",
        "main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000"
      ]
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data/boundaries:/app/data/boundaries:ro
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      APP_NAME: HydroAtlas
      VERSION: 0.1.0
      ENVIRONMENT: production
      LOG_LEVEL: INFO

  # ── ERA5 Scheduler / Ingestion ──────────────────────────────────────
  era5-scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: "no"
    env_file:
      - ./backend/.env

    command: [
      "sh", "-c",
      "python -m ingestion.era5.scheduler && python -m ingestion.era5.precompute_backfill --recent-years ${ERA5_HISTORY_YEARS:-10}"
    ]
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      APP_NAME: HydroAtlas
      VERSION: 0.1.0
      ENVIRONMENT: production
      LOG_LEVEL: INFO
      ERA5_HISTORY_YEARS: "10"
      ERA5_SYNC_CONCURRENCY: "1"
      ERA5_SCHEDULER_TIMEZONE: UTC
      ERA5_SCHEDULER_RUN_ONCE: "true"

  # ── React / Vite Frontend ───────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: "http://localhost:8000"
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend